<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkilLens — Gaming Skills Analyzer</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  body{font-family:'Inter',system-ui,sans-serif;background:#060b14;color:#e2e8f0}
  .glass{background:rgba(255,255,255,0.04);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.08)}
  .gradient-text{background:linear-gradient(135deg,#8b5cf6,#3b82f6,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .btn{background:linear-gradient(135deg,#8b5cf6,#3b82f6);border:none;padding:10px 24px;border-radius:10px;cursor:pointer;font-weight:600;color:white;transition:all .2s}
  .btn:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(139,92,246,.4)}
  input,textarea,select{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:10px 14px;color:#e2e8f0;width:100%}
  input:focus,textarea:focus,select:focus{outline:none;border-color:#8b5cf6}
  .gamer-card{background:linear-gradient(145deg,rgba(139,92,246,.08),rgba(59,130,246,.05));border:1px solid rgba(139,92,246,.2);border-radius:16px;padding:20px;transition:all .3s}
  .gamer-card:hover{border-color:rgba(139,92,246,.5);transform:translateY(-2px)}
  .rank-badge{padding:3px 12px;border-radius:999px;font-size:11px;font-weight:700}
  .tab-active{background:rgba(139,92,246,.2);border-bottom:2px solid #8b5cf6}
</style>
</head>
<body>
<nav class="glass sticky top-0 z-50 px-6 py-4 flex items-center justify-between">
  <div class="flex items-center gap-3">
    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-purple-600 to-blue-600 flex items-center justify-center text-xl">🎮</div>
    <div><h1 class="font-black text-xl gradient-text">SkilLens</h1><p class="text-xs text-slate-400">Gaming Skills Analytics</p></div>
  </div>
  <div class="flex gap-2">
    <button onclick="showTab('profiles')" id="tab-profiles" class="px-4 py-2 rounded-lg text-sm font-medium tab-active transition-all">Profiles</button>
    <button onclick="showTab('sessions')" id="tab-sessions" class="px-4 py-2 rounded-lg text-sm font-medium transition-all">Sessions</button>
    <button onclick="showTab('teams')" id="tab-teams" class="px-4 py-2 rounded-lg text-sm font-medium transition-all">Teams</button>
    <button onclick="showTab('analyze')" id="tab-analyze" class="px-4 py-2 rounded-lg text-sm font-medium transition-all"><i class="fas fa-robot mr-1"></i>AI Coach</button>
  </div>
</nav>

<div class="max-w-6xl mx-auto px-6 py-8">
  <!-- PROFILES -->
  <div id="panel-profiles">
    <div class="flex justify-between items-center mb-6">
      <div><h2 class="text-2xl font-bold">Gamer Profiles</h2><p class="text-slate-400 text-sm">Your gaming identity and stats</p></div>
      <button onclick="toggleForm('profile-form')" class="btn"><i class="fas fa-plus mr-2"></i>New Profile</button>
    </div>
    <div id="profile-form" class="hidden glass rounded-2xl p-6 mb-6">
      <div class="grid grid-cols-3 gap-4">
        <div><label class="text-xs text-slate-400 mb-1 block">Username *</label><input id="pr-user" placeholder="YourGamerTag"></div>
        <div><label class="text-xs text-slate-400 mb-1 block">Main Game</label><input id="pr-game" placeholder="e.g. Valorant, FIFA, LoL"></div>
        <div><label class="text-xs text-slate-400 mb-1 block">Rank</label><input id="pr-rank" placeholder="e.g. Diamond, Plat 2"></div>
        <div><label class="text-xs text-slate-400 mb-1 block">Level / Tier</label><input id="pr-level" placeholder="e.g. Pro, Semi-pro, Amateur"></div>
        <div><label class="text-xs text-slate-400 mb-1 block">Win Rate (%)</label><input id="pr-wr" type="number" placeholder="55"></div>
        <div><label class="text-xs text-slate-400 mb-1 block">Avg KDA</label><input id="pr-kda" placeholder="e.g. 3.2/1.8/4.1"></div>
        <div><label class="text-xs text-slate-400 mb-1 block">Total Games</label><input id="pr-games" type="number" placeholder="500"></div>
        <div class="col-span-2"><label class="text-xs text-slate-400 mb-1 block">Bio</label><input id="pr-bio" placeholder="About your playstyle..."></div>
      </div>
      <div class="flex gap-3 mt-4">
        <button onclick="saveProfile()" class="btn"><i class="fas fa-save mr-2"></i>Save</button>
        <button onclick="toggleForm('profile-form')" class="px-4 py-2 text-slate-400 hover:text-white text-sm transition-colors">Cancel</button>
      </div>
    </div>
    <div id="profiles-grid" class="grid grid-cols-3 gap-5"></div>
  </div>

  <!-- SESSIONS -->
  <div id="panel-sessions" class="hidden">
    <div class="flex justify-between items-center mb-6">
      <div><h2 class="text-2xl font-bold">Game Sessions</h2><p class="text-slate-400 text-sm">Track your performance over time</p></div>
      <button onclick="toggleForm('session-form')" class="btn"><i class="fas fa-plus mr-2"></i>Log Session</button>
    </div>
    <div id="session-form" class="hidden glass rounded-2xl p-6 mb-6">
      <div class="grid grid-cols-4 gap-4">
        <div><label class="text-xs text-slate-400 mb-1 block">Game</label><input id="ss-game" placeholder="Valorant"></div>
        <div><label class="text-xs text-slate-400 mb-1 block">Result</label><select id="ss-result"><option>Win</option><option>Loss</option><option>Draw</option></select></div>
        <div><label class="text-xs text-slate-400 mb-1 block">KDA</label><input id="ss-kda" placeholder="25/10/8"></div>
        <div><label class="text-xs text-slate-400 mb-1 block">Duration (min)</label><input id="ss-dur" type="number" placeholder="45"></div>
        <div><label class="text-xs text-slate-400 mb-1 block">Kills</label><input id="ss-kills" type="number" placeholder="25"></div>
        <div><label class="text-xs text-slate-400 mb-1 block">Deaths</label><input id="ss-deaths" type="number" placeholder="10"></div>
        <div><label class="text-xs text-slate-400 mb-1 block">Assists</label><input id="ss-assists" type="number" placeholder="8"></div>
        <div><label class="text-xs text-slate-400 mb-1 block">Score</label><input id="ss-score" type="number" placeholder="4800"></div>
        <div class="col-span-4"><label class="text-xs text-slate-400 mb-1 block">Notes / What went well/wrong?</label><textarea id="ss-notes" rows="2" placeholder="Key plays, mistakes, what to improve..."></textarea></div>
      </div>
      <div class="flex gap-3 mt-4">
        <button onclick="saveSession()" class="btn"><i class="fas fa-save mr-2"></i>Log it</button>
        <button onclick="toggleForm('session-form')" class="px-4 py-2 text-slate-400 hover:text-white text-sm transition-colors">Cancel</button>
      </div>
    </div>
    <div id="sessions-list" class="space-y-3"></div>
  </div>

  <!-- TEAMS -->
  <div id="panel-teams" class="hidden">
    <div class="flex justify-between items-center mb-6">
      <div><h2 class="text-2xl font-bold">Teams & Orgs</h2><p class="text-slate-400 text-sm">Find teams or post yours</p></div>
      <button onclick="toggleForm('team-form')" class="btn"><i class="fas fa-plus mr-2"></i>Create Team</button>
    </div>
    <div id="team-form" class="hidden glass rounded-2xl p-6 mb-6">
      <div class="grid grid-cols-3 gap-4">
        <div><label class="text-xs text-slate-400 mb-1 block">Team Name *</label><input id="t-name" placeholder="Team Name"></div>
        <div><label class="text-xs text-slate-400 mb-1 block">Game</label><input id="t-game" placeholder="Valorant, LoL..."></div>
        <div><label class="text-xs text-slate-400 mb-1 block">Min Rank Required</label><input id="t-rank" placeholder="Diamond+"></div>
        <div class="col-span-2"><label class="text-xs text-slate-400 mb-1 block">Description & Requirements</label><input id="t-desc" placeholder="Looking for IGL, aggressive players..."></div>
        <div><label class="text-xs text-slate-400 mb-1 block">Contact</label><input id="t-contact" placeholder="Discord: user#1234"></div>
      </div>
      <div class="flex gap-3 mt-4">
        <button onclick="saveTeam()" class="btn"><i class="fas fa-save mr-2"></i>Create</button>
        <button onclick="toggleForm('team-form')" class="px-4 py-2 text-slate-400 hover:text-white text-sm transition-colors">Cancel</button>
      </div>
    </div>
    <div id="teams-list" class="grid grid-cols-3 gap-4"></div>
  </div>

  <!-- AI COACH -->
  <div id="panel-analyze" class="hidden">
    <div class="mb-6"><h2 class="text-2xl font-bold">AI Gaming Coach</h2><p class="text-slate-400 text-sm">Personalized analysis and improvement plan</p></div>
    <div class="grid grid-cols-2 gap-6">
      <div class="glass rounded-2xl p-6 space-y-4">
        <div><label class="text-xs text-slate-400 mb-1 block">Game & Role</label><input id="ai-game" placeholder="e.g. Valorant, Duelist, Diamond rank"></div>
        <div><label class="text-xs text-slate-400 mb-1 block">Recent Stats</label><textarea id="ai-stats" rows="3" placeholder="Win rate: 52%, KDA: 2.8, headshot: 22%, clutch rate: 30%..."></textarea></div>
        <div><label class="text-xs text-slate-400 mb-1 block">Goal</label><input id="ai-goal" placeholder="e.g. Reach Radiant, join a team, improve aim..."></div>
        <div><label class="text-xs text-slate-400 mb-1 block">Biggest Problem</label><input id="ai-problem" placeholder="e.g. I lose duels mid-game, bad rotations..."></div>
        <button onclick="analyzePlayer()" class="btn w-full"><i class="fas fa-brain mr-2"></i>Get AI Coaching Plan</button>
      </div>
      <div class="glass rounded-2xl p-6">
        <h3 class="font-semibold mb-4 gradient-text">Your Coaching Plan</h3>
        <div id="coaching-result" class="text-slate-400 text-sm flex flex-col items-center justify-center h-40 opacity-50">
          <span class="text-4xl mb-3">🎮</span><p>Submit your stats to get a coaching plan</p>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast" class="fixed bottom-6 right-6 px-6 py-3 rounded-xl font-semibold hidden z-50 text-white"></div>

<script>
const SUPABASE_URL='https://nmulrsbqdeqokvrybapn.supabase.co'
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5tdWxyc2JxZGVxb2t2cnliYXBuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyODY0NDcsImV4cCI6MjA5NDg2MjQ0N30.iGN_OGVkw0j3VCEi9qUroMbpT37P3UPRUf1cYyqFBys'
const GROQ_KEY='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'
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY)
function showToast(msg,type='success'){const t=document.getElementById('toast');t.textContent=msg;t.className=`fixed bottom-6 right-6 px-6 py-3 rounded-xl font-semibold z-50 text-white ${type==='error'?'bg-red-600':'bg-purple-600'}`;setTimeout(()=>t.classList.add('hidden'),3000)}
function toggleForm(id){document.getElementById(id).classList.toggle('hidden')}
function showTab(tab){['profiles','sessions','teams','analyze'].forEach(t=>{document.getElementById(`panel-${t}`).classList.add('hidden');document.getElementById(`tab-${t}`).classList.remove('tab-active')});document.getElementById(`panel-${tab}`).classList.remove('hidden');document.getElementById(`tab-${tab}`).classList.add('tab-active');if(tab==='profiles')loadProfiles();if(tab==='sessions')loadSessions();if(tab==='teams')loadTeams()}

async function saveProfile(){
  const d={username:document.getElementById('pr-user').value,main_game:document.getElementById('pr-game').value,rank:document.getElementById('pr-rank').value,level:document.getElementById('pr-level').value,win_rate:parseInt(document.getElementById('pr-wr').value)||null,avg_kda:document.getElementById('pr-kda').value,total_games:parseInt(document.getElementById('pr-games').value)||null,bio:document.getElementById('pr-bio').value}
  if(!d.username){showToast('Username required','error');return}
  const{error}=await sb.from('sl_profiles').insert(d)
  if(error){showToast('Error: '+error.message,'error');return}
  showToast('✅ Profile created!');toggleForm('profile-form');loadProfiles()
}
async function saveSession(){
  const d={game:document.getElementById('ss-game').value,result:document.getElementById('ss-result').value,kda:document.getElementById('ss-kda').value,duration:parseInt(document.getElementById('ss-dur').value)||null,kills:parseInt(document.getElementById('ss-kills').value)||null,deaths:parseInt(document.getElementById('ss-deaths').value)||null,assists:parseInt(document.getElementById('ss-assists').value)||null,score:parseInt(document.getElementById('ss-score').value)||null,notes:document.getElementById('ss-notes').value}
  if(!d.game){showToast('Game required','error');return}
  const{error}=await sb.from('sl_sessions').insert(d)
  if(error){showToast('Error: '+error.message,'error');return}
  showToast('✅ Session logged!');toggleForm('session-form');loadSessions()
}
async function saveTeam(){
  const d={name:document.getElementById('t-name').value,game:document.getElementById('t-game').value,min_rank:document.getElementById('t-rank').value,description:document.getElementById('t-desc').value,contact:document.getElementById('t-contact').value,recruiting:true}
  if(!d.name){showToast('Name required','error');return}
  const{error}=await sb.from('sl_teams').insert(d)
  if(error){showToast('Error: '+error.message,'error');return}
  showToast('✅ Team created!');toggleForm('team-form');loadTeams()
}
async function loadProfiles(){
  const{data}=await sb.from('sl_profiles').select('*').order('created_at',{ascending:false})
  const grid=document.getElementById('profiles-grid')
  if(!data?.length){grid.innerHTML='<div class="col-span-3 glass rounded-xl p-8 text-center text-slate-400"><span class="text-4xl block mb-3">🎮</span>No profiles yet</div>';return}
  grid.innerHTML=data.map(p=>`<div class="gamer-card"><div class="flex justify-between items-start mb-3"><div class="w-12 h-12 rounded-xl bg-gradient-to-br from-purple-600 to-blue-700 flex items-center justify-center text-xl font-black text-white">${p.username?.[0]?.toUpperCase()||'?'}</div><button onclick="deleteRec('sl_profiles','${p.id}',loadProfiles)" class="text-slate-600 hover:text-red-400"><i class="fas fa-trash text-sm"></i></button></div><h3 class="font-bold text-lg">${p.username}</h3><p class="text-sm text-purple-400">${p.main_game||'No game'} · ${p.rank||'Unranked'}</p><div class="grid grid-cols-3 gap-2 mt-3 text-center">${p.win_rate?`<div class="glass rounded-lg p-2"><div class="text-sm font-bold text-blue-400">${p.win_rate}%</div><div class="text-xs text-slate-500">Win Rate</div></div>`:''}<div class="glass rounded-lg p-2"><div class="text-sm font-bold text-purple-400">${p.avg_kda||'N/A'}</div><div class="text-xs text-slate-500">KDA</div></div>${p.total_games?`<div class="glass rounded-lg p-2"><div class="text-sm font-bold text-cyan-400">${p.total_games}</div><div class="text-xs text-slate-500">Games</div></div>`:''}</div>${p.bio?`<p class="text-xs text-slate-400 mt-3">${p.bio}</p>`:''}</div>`).join('')
}
async function loadSessions(){
  const{data}=await sb.from('sl_sessions').select('*').order('created_at',{ascending:false})
  const list=document.getElementById('sessions-list')
  if(!data?.length){list.innerHTML='<div class="glass rounded-xl p-8 text-center text-slate-400"><span class="text-4xl block mb-3">🎯</span>No sessions logged</div>';return}
  list.innerHTML=data.map(s=>`<div class="glass rounded-xl p-4 flex items-center gap-4"><div class="w-10 h-10 rounded-lg flex items-center justify-center font-bold ${s.result==='Win'?'bg-green-500/20 text-green-400':s.result==='Loss'?'bg-red-500/20 text-red-400':'bg-slate-500/20 text-slate-400'}">${s.result==='Win'?'W':s.result==='Loss'?'L':'D'}</div><div class="flex-1"><div class="flex items-center gap-3"><span class="font-medium">${s.game}</span>${s.kda?`<span class="text-xs text-slate-400">KDA: ${s.kda}</span>`:''}</div><div class="text-xs text-slate-500 mt-0.5">${s.notes?s.notes.substring(0,60)+'...':''}</div></div><div class="text-right text-xs text-slate-500">${s.score?`Score: ${s.score}`:''}${s.duration?`<br>${s.duration}min`:''}</div><button onclick="deleteRec('sl_sessions','${s.id}',loadSessions)" class="text-slate-600 hover:text-red-400"><i class="fas fa-trash text-sm"></i></button></div>`).join('')
}
async function loadTeams(){
  const{data}=await sb.from('sl_teams').select('*').order('created_at',{ascending:false})
  const list=document.getElementById('teams-list')
  if(!data?.length){list.innerHTML='<div class="col-span-3 glass rounded-xl p-8 text-center text-slate-400"><span class="text-4xl block mb-3">🏆</span>No teams yet</div>';return}
  list.innerHTML=data.map(t=>`<div class="gamer-card"><div class="flex justify-between mb-2"><h3 class="font-bold">${t.name}</h3><button onclick="deleteRec('sl_teams','${t.id}',loadTeams)" class="text-slate-600 hover:text-red-400"><i class="fas fa-trash text-sm"></i></button></div><p class="text-sm text-purple-400">${t.game||'Various games'}</p>${t.min_rank?`<p class="text-xs text-slate-400 mt-1">Min rank: ${t.min_rank}</p>`:''}<p class="text-sm text-slate-400 mt-2">${t.description||''}</p>${t.contact?`<p class="text-xs text-cyan-400 mt-3">${t.contact}</p>`:''}</div>`).join('')
}
async function analyzePlayer(){
  const game=document.getElementById('ai-game').value,stats=document.getElementById('ai-stats').value,goal=document.getElementById('ai-goal').value,problem=document.getElementById('ai-problem').value
  if(!game){showToast('Fill game info','error');return}
  document.getElementById('coaching-result').innerHTML='<div class="flex items-center gap-3 text-purple-400"><div class="animate-spin rounded-full h-6 w-6 border-b-2 border-purple-400"></div><span>Creating your coaching plan...</span></div>'
  try{
    const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+GROQ_KEY},body:JSON.stringify({model:'llama-3.3-70b-versatile',messages:[{role:'user',content:`You are an elite esports coach. Create a coaching plan.\n\nGAME & ROLE: ${game}\nSTATS: ${stats}\nGOAL: ${goal}\nBIGGEST PROBLEM: ${problem}\n\nProvide:\n1. SKILL ASSESSMENT (rating the main areas)\n2. TOP 3 IMMEDIATE IMPROVEMENTS\n3. DAILY TRAINING ROUTINE (specific drills)\n4. MENTAL GAME tips\n5. TIMELINE to reach goal\n\nBe specific, actionable, no fluff.`}]})})
    const data=await res.json()
    document.getElementById('coaching-result').innerHTML=`<div class="text-sm text-slate-300 whitespace-pre-line leading-relaxed">${(data.choices?.[0]?.message?.content||'').replace(/\*\*(.*?)\*\*/g,'<strong class="text-purple-400">$1</strong>').replace(/\n/g,'<br>')}</div>`
  }catch(e){document.getElementById('coaching-result').innerHTML='<p class="text-red-400">Error: '+e.message+'</p>'}
}
async function deleteRec(table,id,reload){if(!confirm('Delete?'))return;await sb.from(table).delete().eq('id',id);reload()}
loadProfiles()
</script>
</body>
</html>
